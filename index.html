<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0a0910;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
 
    .intro-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    /* Glow behind */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.4) 0%, transparent 70%);
      animation: glow-pulse 1.5s ease-in-out infinite alternate;
      opacity: 0;
      animation-delay: 0.5s;
      animation-fill-mode: forwards;
    }
 
    @keyframes glow-pulse {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.15); }
    }
 
    /* Logo text */
    .logo-text {
      position: relative;
      font-family: 'Syne', sans-serif;
      font-size: 100px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -4px;
      opacity: 0;
      transform: rotate(-180deg) scale(0.3);
      animation: spin-appear 1.6s cubic-bezier(0.2, 0.8, 0.3, 1) forwards 0.3s;
    }
 
    .logo-text .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      background: #7c3aed;
      border-radius: 3px;
      transform: rotate(45deg);
      margin-left: 4px;
      vertical-align: middle;
      margin-bottom: 12px;
    }
 
    @keyframes spin-appear {
      0%   { opacity: 0; transform: rotate(-180deg) scale(0.3); }
      60%  { opacity: 1; transform: rotate(6deg) scale(1.05); }
      80%  { transform: rotate(-3deg) scale(0.97); }
      100% { opacity: 1; transform: rotate(0deg) scale(1); }
    }
 
    /* Fade out everything */
    .fade-out {
      position: fixed;
      inset: 0;
      background: #0a0910;
      opacity: 0;
      pointer-events: none;
      animation: do-fade-out 0.7s ease forwards 2.8s;
      z-index: 99;
    }
 
    @keyframes do-fade-out {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="intro-wrap">
    <div class="glow"></div>
    <div class="logo-text">AL<span class="dot"></span></div>
  </div>
  <div class="fade-out"></div>
 
  <script>
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 3400);
  </script>
</body>
</html>
