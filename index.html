<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0a0910;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
 
    .intro-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
 
    /* Glow ring behind logo */
    .glow-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.35) 0%, transparent 70%);
      animation: pulse-glow 1.8s ease-in-out infinite alternate;
      opacity: 0;
      animation-delay: 0.4s;
    }
 
    @keyframes pulse-glow {
      from { transform: scale(0.9); opacity: 0.6; }
      to   { transform: scale(1.2); opacity: 1; }
    }
 
    /* Logo image */
    .logo-img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      position: relative;
      opacity: 0;
      animation:
        fade-in   0.5s ease forwards 0.2s,
        spin-in   1.8s cubic-bezier(.2,.8,.3,1) forwards 0.2s,
        fade-out  0.6s ease forwards 2.8s;
    }
 
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
 
    @keyframes spin-in {
      0%   { transform: rotate(-180deg) scale(0.4); }
      60%  { transform: rotate(8deg)   scale(1.05); }
      80%  { transform: rotate(-4deg)  scale(0.98); }
      100% { transform: rotate(0deg)   scale(1); }
    }
 
    @keyframes fade-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
 
    /* Full screen fade to page */
    .overlay {
      position: fixed;
      inset: 0;
      background: #0a0910;
      opacity: 1;
      pointer-events: none;
      animation: overlay-out 0.7s ease forwards 3.2s;
      z-index: 10;
    }
 
    @keyframes overlay-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
 
  <div class="intro-wrap">
    <div class="glow-ring"></div>
    <img class="logo-img" src="logo.png" alt="AL Management">
  </div>
 
  <div class="overlay"></div>
 
  <script>
    // Redirect to index after animation completes
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 3500);
  </script>
 
</body>
</html>
