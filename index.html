<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #0a0910;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
 
    .intro-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .glow {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.5) 0%, transparent 70%);
      opacity: 0;
      animation: glow-pulse 0.8s ease forwards 0.6s;
    }
 
    @keyframes glow-pulse {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
 
    .logo-text {
      position: relative;
      font-family: Arial Black, Arial, sans-serif;
      font-size: 110px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -5px;
      opacity: 0;
      transform: rotate(-180deg) scale(0.2);
      animation: spin-appear 1.4s cubic-bezier(0.2, 0.8, 0.3, 1) forwards 0.2s;
    }
 
    .dot {
      display: inline-block;
      width: 18px;
      height: 18px;
      background: #7c3aed;
      border-radius: 3px;
      transform: rotate(45deg);
      margin-left: 6px;
      vertical-align: middle;
      margin-bottom: 16px;
    }
 
    @keyframes spin-appear {
      0%   { opacity: 0; transform: rotate(-180deg) scale(0.2); }
      65%  { opacity: 1; transform: rotate(6deg) scale(1.06); }
      82%  { transform: rotate(-3deg) scale(0.97); }
      100% { opacity: 1; transform: rotate(0deg) scale(1); }
    }
 
    .fade-out {
      position: fixed;
      inset: 0;
      background: #0a0910;
      opacity: 0;
      pointer-events: none;
      animation: do-fade 0.8s ease forwards 2.6s;
      z-index: 99;
    }
 
    @keyframes do-fade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="intro-wrap">
    <div class="glow"></div>
    <div class="logo-text">AL<span class="dot"></span></div>
  </div>
  <div class="fade-out"></div>
 
  <script>
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 3300);
  </script>
</body>
</html>
